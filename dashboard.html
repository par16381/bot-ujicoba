<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Dashboard Analytics</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600;700&display=swap');

    :root {
      --bg:         var(--tg-theme-bg-color,          #ffffff);
      --bg2:        var(--tg-theme-secondary-bg-color, #f1f1f1);
      --text:       var(--tg-theme-text-color,         #111111);
      --hint:       var(--tg-theme-hint-color,         #888888);
      --accent:     var(--tg-theme-button-color,       #2481cc);
      --accent-txt: var(--tg-theme-button-text-color,  #ffffff);
      --border:     color-mix(in srgb, var(--bg) 70%, var(--text) 30%);
      --green:      #22c55e;
      --red:        #ef4444;
      --radius:     14px;
      --radius-sm:  9px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding-bottom: 40px;
    }

    /* ── Header ── */
    .header {
      padding: 14px 16px 10px;
      display: flex; align-items: center; gap: 10px;
      position: sticky; top: 0; z-index: 10;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
    }
    .btn-back {
      width: 32px; height: 32px; border: none;
      background: var(--bg2); border-radius: 50%;
      cursor: pointer; display: none;
      align-items: center; justify-content: center;
      color: var(--text); font-size: 20px; flex-shrink: 0;
      line-height: 1;
    }
    .btn-back.show { display: flex; }
    .header-title { font-size: 17px; font-weight: 700; letter-spacing: -0.3px; }
    .header-sub   { font-size: 11px; color: var(--hint); margin-top: 1px; }
    .header-badge {
      margin-left: auto;
      background: var(--accent); color: var(--accent-txt);
      font-size: 10px; font-weight: 600;
      padding: 3px 9px; border-radius: 20px;
      text-transform: uppercase; letter-spacing: 0.5px;
    }

    /* ── Loading / Error ── */
    .center-state {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      min-height: 65vh; gap: 12px; padding: 24px;
      text-align: center;
    }
    .spinner {
      width: 40px; height: 40px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .state-icon  { font-size: 40px; }
    .state-title { font-size: 15px; font-weight: 600; }
    .state-msg   { font-size: 13px; color: var(--hint); max-width: 260px; }

    /* ── View ── */
    .view { display: none; }
    .view.active { display: block; animation: fadeUp 0.2s ease; }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Section ── */
    .section { padding: 16px 16px 0; }
    .section-label {
      font-size: 10px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 1.2px;
      color: var(--hint); margin-bottom: 10px;
    }
    .divider { height: 16px; }

    /* ── Cards ── */
    .cards { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .cards.three { grid-template-columns: 1fr 1fr 1fr; }
    .card {
      background: var(--bg2); border-radius: var(--radius);
      padding: 14px 14px 12px;
      position: relative; overflow: hidden;
    }
    .card::before {
      content: ''; position: absolute;
      top: 0; left: 0; right: 0; height: 3px;
      background: var(--accent);
      border-radius: var(--radius) var(--radius) 0 0;
    }
    .card.green::before { background: var(--green); }
    .card.red::before   { background: var(--red); }
    .card-icon  { font-size: 20px; margin-bottom: 6px; display: block; }
    .card-val   {
      font-family: 'DM Mono', monospace;
      font-size: 24px; font-weight: 500; line-height: 1;
    }
    .card-lbl   { font-size: 11px; color: var(--hint); margin-top: 3px; }

    /* ── Quick range ── */
    .quick-range {
      display: flex; gap: 6px;
      overflow-x: auto; padding-bottom: 2px; margin-bottom: 10px;
    }
    .quick-range::-webkit-scrollbar { display: none; }
    .qbtn {
      background: var(--bg2); border: 1.5px solid var(--border);
      border-radius: 20px; padding: 5px 13px;
      font-size: 12px; font-weight: 500; color: var(--hint);
      cursor: pointer; white-space: nowrap;
      font-family: 'DM Sans', sans-serif; transition: all 0.15s;
    }
    .qbtn.active {
      background: var(--accent); border-color: var(--accent);
      color: var(--accent-txt);
    }

    /* ── Date range ── */
    .date-range {
      display: flex; gap: 8px; align-items: center; margin-bottom: 12px;
    }
    .date-input {
      flex: 1; background: var(--bg2);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 9px 10px; font-size: 12px;
      color: var(--text); font-family: 'DM Sans', sans-serif;
      outline: none; min-width: 0;
    }
    .date-input:focus { border-color: var(--accent); }
    .date-sep { color: var(--hint); font-size: 12px; flex-shrink: 0; }
    .btn-apply {
      background: var(--accent); color: var(--accent-txt);
      border: none; border-radius: var(--radius-sm);
      padding: 9px 13px; font-size: 12px; font-weight: 600;
      cursor: pointer; font-family: 'DM Sans', sans-serif; flex-shrink: 0;
    }
    .btn-apply:active { opacity: 0.8; }

    /* ── Stats table ── */
    .stats-table-wrap {
      background: var(--bg2); border-radius: var(--radius); overflow: hidden;
    }
    .stats-table { width: 100%; border-collapse: collapse; }
    .stats-table thead th {
      padding: 10px 14px;
      font-size: 10px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 1px;
      color: var(--hint); text-align: left;
      border-bottom: 1px solid var(--border);
    }
    .stats-table thead th.right { text-align: right; }
    .stats-table tbody tr { border-bottom: 1px solid var(--border); }
    .stats-table tbody tr:last-child { border-bottom: none; }
    .stats-table tbody td { padding: 10px 14px; font-size: 13px; }
    .td-date {
      font-family: 'DM Mono', monospace; font-size: 12px;
    }
    .td-views {
      text-align: right;
      font-family: 'DM Mono', monospace; font-size: 13px;
      font-weight: 500; color: var(--accent);
    }
    .td-views.zero { color: var(--hint); }
    .td-state { text-align: center; padding: 26px 14px !important; font-size: 13px; color: var(--hint); }

    /* ── Search ── */
    .search-wrap { position: relative; margin-bottom: 10px; }
    .search-icon {
      position: absolute; left: 11px; top: 50%;
      transform: translateY(-50%); color: var(--hint);
      font-size: 13px; pointer-events: none;
    }
    .search-input {
      width: 100%; background: var(--bg2);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 9px 36px 9px 32px;
      font-size: 13px; color: var(--text);
      font-family: 'DM Sans', sans-serif; outline: none;
    }
    .search-input:focus { border-color: var(--accent); }
    .search-input::placeholder { color: var(--hint); }
    .search-clear {
      position: absolute; right: 9px; top: 50%;
      transform: translateY(-50%);
      background: none; border: none; color: var(--hint);
      font-size: 17px; cursor: pointer;
      display: none; line-height: 1; padding: 2px;
    }
    .search-clear.show { display: block; }

    /* ── Link list ── */
    .link-list { display: flex; flex-direction: column; gap: 8px; }
    .link-item {
      background: var(--bg2); border-radius: var(--radius);
      padding: 12px 14px;
      display: flex; align-items: center; gap: 10px;
      cursor: pointer; transition: opacity 0.15s;
    }
    .link-item:active { opacity: 0.6; }
    .link-rank {
      font-family: 'DM Mono', monospace;
      font-size: 11px; color: var(--hint);
      width: 22px; flex-shrink: 0; text-align: center;
    }
    .link-info { flex: 1; min-width: 0; }
    .link-title {
      font-size: 13px; font-weight: 600;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .link-meta {
      font-family: 'DM Mono', monospace;
      font-size: 11px; color: var(--hint); margin-top: 2px;
    }
    .link-right { flex-shrink: 0; text-align: right; }
    .link-views {
      font-family: 'DM Mono', monospace;
      font-size: 15px; font-weight: 500; color: var(--accent);
    }
    .link-views-lbl { font-size: 10px; color: var(--hint); }
    .link-arrow { color: var(--hint); font-size: 16px; flex-shrink: 0; }

    /* ── Pagination ── */
    .pagination {
      display: flex; justify-content: center;
      align-items: center; gap: 10px; margin-top: 14px;
    }
    .page-btn {
      background: var(--bg2); border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 7px 16px; font-size: 13px;
      color: var(--text); cursor: pointer;
      font-family: 'DM Sans', sans-serif;
    }
    .page-btn:disabled { opacity: 0.3; cursor: not-allowed; }
    .page-info { font-size: 12px; color: var(--hint); }

    /* ── Detail card ── */
    .detail-card {
      background: var(--bg2); border-radius: var(--radius);
      padding: 16px; margin-bottom: 14px;
      border-left: 3px solid var(--accent);
    }
    .detail-title { font-size: 15px; font-weight: 700; margin-bottom: 3px; word-break: break-word; }
    .detail-code  { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--hint); margin-bottom: 12px; }
    .detail-stat  { display: flex; align-items: baseline; gap: 6px; }
    .detail-val   {
      font-family: 'DM Mono', monospace;
      font-size: 30px; font-weight: 500;
      letter-spacing: -1px; color: var(--accent);
    }
    .detail-lbl { font-size: 13px; color: var(--hint); }

    /* ── Skeleton ── */
    .skel {
      background: linear-gradient(90deg, var(--bg2) 25%, var(--border) 50%, var(--bg2) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.2s infinite; border-radius: 6px;
    }
    @keyframes shimmer {
      from { background-position: 200% 0; }
      to   { background-position: -200% 0; }
    }
  </style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <button class="btn-back" id="btn-back">‹</button>
  <div>
    <div class="header-title" id="header-title">Analytics</div>
    <div class="header-sub"   id="header-sub">File Share Bot</div>
  </div>
  <span class="header-badge" id="header-badge">User</span>
</div>

<!-- LOADING -->
<div class="center-state" id="view-loading">
  <div class="spinner"></div>
  <div class="state-msg">Memuat dashboard...</div>
</div>

<!-- ERROR -->
<div class="center-state" id="view-error" style="display:none;">
  <span class="state-icon">⚠️</span>
  <div class="state-title">Tidak Bisa Diakses</div>
  <div class="state-msg" id="error-msg">Kamu tidak memiliki akses ke dashboard ini.</div>
</div>

<!-- ══ VIEW MAIN ══ -->
<div class="view" id="view-main">

  <div class="section">
    <div class="section-label">Ringkasan</div>
    <div class="cards" id="summary-cards"></div>
  </div>

  <div class="divider"></div>

  <div class="section">
    <div class="section-label">Statistik Views</div>
    <div class="quick-range" id="qr-global">
      <button class="qbtn" data-days="7">7 Hari</button>
      <button class="qbtn active" data-days="30">30 Hari</button>
      <button class="qbtn" data-days="90">3 Bulan</button>
      <button class="qbtn" data-days="365">1 Tahun</button>
    </div>
    <div class="date-range">
      <input type="date" class="date-input" id="g-from">
      <span class="date-sep">→</span>
      <input type="date" class="date-input" id="g-to">
      <button class="btn-apply" id="btn-g-apply">Terapkan</button>
    </div>
    <div class="stats-table-wrap">
      <table class="stats-table">
        <thead><tr><th>Tanggal</th><th class="right">Views</th></tr></thead>
        <tbody id="global-tbody">
          <tr><td colspan="2" class="td-state">Memuat...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <div class="divider"></div>

  <div class="section">
    <div class="section-label">Performa Link</div>
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" class="search-input" id="link-search"
             placeholder="Cari judul atau kode link...">
      <button class="search-clear" id="search-clear">×</button>
    </div>
    <div class="link-list" id="link-list"></div>
    <div class="pagination" id="pagination" style="display:none;">
      <button class="page-btn" id="btn-prev">← Prev</button>
      <span class="page-info" id="page-info"></span>
      <button class="page-btn" id="btn-next">Next →</button>
    </div>
  </div>

</div>

<!-- ══ VIEW DETAIL ══ -->
<div class="view" id="view-detail">
  <div class="section">
    <div class="detail-card" id="detail-card">
      <div class="skel" style="height:16px;width:55%;margin-bottom:8px;"></div>
      <div class="skel" style="height:11px;width:35%;margin-bottom:14px;"></div>
      <div class="skel" style="height:32px;width:25%;"></div>
    </div>

    <div class="section-label">Views Per Hari</div>
    <div class="quick-range" id="qr-detail">
      <button class="qbtn" data-days="7">7 Hari</button>
      <button class="qbtn active" data-days="30">30 Hari</button>
      <button class="qbtn" data-days="90">3 Bulan</button>
    </div>
    <div class="date-range">
      <input type="date" class="date-input" id="d-from">
      <span class="date-sep">→</span>
      <input type="date" class="date-input" id="d-to">
      <button class="btn-apply" id="btn-d-apply">Terapkan</button>
    </div>
    <div class="stats-table-wrap">
      <table class="stats-table">
        <thead><tr><th>Tanggal</th><th class="right">Views</th></tr></thead>
        <tbody id="detail-tbody">
          <tr><td colspan="2" class="td-state">Memuat...</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<script>
const tg         = window.Telegram?.WebApp;
const params     = new URLSearchParams(location.search);
const userId     = tg?.initDataUnsafe?.user?.id || parseInt(params.get('uid')) || null;
const backendUrl = decodeURIComponent(params.get('backend') || '');

let currentPage       = 1;
let totalPages        = 1;
let currentDetailCode = null;
let searchQuery       = '';
let searchTimer       = null;

const $   = id => document.getElementById(id);
const fmt = n  => (n ?? 0).toLocaleString('id-ID');

function showView(id) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  $(id)?.classList.add('active');
}

function showError(msg) {
  $('view-loading').style.display = 'none';
  $('view-error').style.display   = 'flex';
  $('error-msg').textContent = msg;
}

function dateStr(d) { return d.toISOString().split('T')[0]; }
function today()    { return dateStr(new Date()); }
function daysAgo(n) {
  const d = new Date();
  d.setDate(d.getDate() - n + 1);
  return dateStr(d);
}

// Format "19.05.2026"
function fmtDate(str) {
  const d  = new Date(str);
  const dd = String(d.getDate()).padStart(2, '0');
  const mm = String(d.getMonth() + 1).padStart(2, '0');
  return `${dd}.${mm}.${d.getFullYear()}`;
}

// Isi semua tanggal dalam rentang (yang tidak ada data = 0), urutkan terbaru dulu
function fillRange(from, to, data) {
  const map = {};
  data.forEach(d => {
    map[new Date(d.date).toISOString().split('T')[0]] = d.views;
  });
  const rows = [];
  const cur  = new Date(from);
  const end  = new Date(to);
  while (cur <= end) {
    const key = dateStr(cur);
    rows.push({ date: key, views: map[key] ?? 0 });
    cur.setDate(cur.getDate() + 1);
  }
  return rows.reverse(); // terbaru di atas
}

function renderTable(tbodyId, from, to, data) {
  const rows = fillRange(from, to, data);
  $(tbodyId).innerHTML = rows.length === 0
    ? `<tr><td colspan="2" class="td-state">Tidak ada data</td></tr>`
    : rows.map(r => `
        <tr>
          <td class="td-date">${fmtDate(r.date)}</td>
          <td class="td-views ${r.views === 0 ? 'zero' : ''}">${fmt(r.views)}</td>
        </tr>`).join('');
}

async function apiFetch(path) {
  const res  = await fetch(`${backendUrl}${path}`);
  const data = await res.json();
  if (!data.ok) throw new Error(data.error || 'Terjadi kesalahan');
  return data;
}

function setDefaultDates() {
  $('g-from').value = daysAgo(30); $('g-to').value = today();
  $('d-from').value = daysAgo(30); $('d-to').value = today();
}

function setupQuickRange(cid, fromId, toId, onApply) {
  document.querySelectorAll(`#${cid} .qbtn`).forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll(`#${cid} .qbtn`).forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      $(fromId).value = daysAgo(parseInt(btn.dataset.days));
      $(toId).value   = today();
      onApply();
    });
  });
}

async function loadSummary() {
  const data  = await apiFetch(`/dashboard/summary?user_id=${userId}`);
  $('header-badge').textContent = data.role === 'admin' ? 'Admin' : 'User';
  const cards = $('summary-cards');
  if (data.role === 'admin') {
    cards.className = 'cards three';
    cards.innerHTML = `
      <div class="card">
        <span class="card-icon">🔗</span>
        <div class="card-val">${fmt(data.totalLinks)}</div>
        <div class="card-lbl">Total Link</div>
      </div>
      <div class="card green">
        <span class="card-icon">👁️</span>
        <div class="card-val">${fmt(data.totalViews)}</div>
        <div class="card-lbl">Total Views</div>
      </div>
      <div class="card red">
        <span class="card-icon">🚫</span>
        <div class="card-val">${fmt(data.totalBanned)}</div>
        <div class="card-lbl">User Banned</div>
      </div>`;
  } else {
    cards.className = 'cards';
    cards.innerHTML = `
      <div class="card">
        <span class="card-icon">🔗</span>
        <div class="card-val">${fmt(data.totalLinks)}</div>
        <div class="card-lbl">Total Link</div>
      </div>
      <div class="card green">
        <span class="card-icon">👁️</span>
        <div class="card-val">${fmt(data.totalViews)}</div>
        <div class="card-lbl">Total Views</div>
      </div>`;
  }
}

async function loadGlobalTable() {
  const from = $('g-from').value, to = $('g-to').value;
  if (!from || !to) return;
  $('global-tbody').innerHTML = `<tr><td colspan="2" class="td-state">Memuat...</td></tr>`;
  try {
    const data = await apiFetch(`/dashboard/chart?user_id=${userId}&date_from=${from}&date_to=${to}`);
    renderTable('global-tbody', from, to, data.data);
  } catch {
    $('global-tbody').innerHTML = `<tr><td colspan="2" class="td-state">Gagal memuat data</td></tr>`;
  }
}

async function loadLinks(page = 1, query = '') {
  currentPage = page;
  const list  = $('link-list');
  list.innerHTML = `<div style="padding:20px;text-align:center;color:var(--hint);font-size:13px;">Memuat...</div>`;
  const q    = query ? `&search=${encodeURIComponent(query)}` : '';
  const data = await apiFetch(`/dashboard/links?user_id=${userId}&page=${page}&limit=10${q}`);
  totalPages = Math.ceil(data.total / data.limit) || 1;

  if (data.links.length === 0) {
    list.innerHTML = `<div style="padding:24px;text-align:center;color:var(--hint);font-size:13px;">${
      query ? `Tidak ada hasil untuk "<b>${query}</b>"` : 'Belum ada link'
    }</div>`;
    $('pagination').style.display = 'none';
    return;
  }

  list.innerHTML = data.links.map((link, i) => {
    const title = link.title || link.code;
    return `
      <div class="link-item" onclick="openDetail('${link.code}')">
        <div class="link-rank">#${(page - 1) * 10 + i + 1}</div>
        <div class="link-info">
          <div class="link-title">${title}</div>
          <div class="link-meta">${link.code} · ${link.type}</div>
        </div>
        <div class="link-right">
          <div class="link-views">${fmt(link.download_count)}</div>
          <div class="link-views-lbl">views</div>
        </div>
        <div class="link-arrow">›</div>
      </div>`;
  }).join('');

  const pag = $('pagination');
  if (totalPages > 1) {
    pag.style.display = 'flex';
    $('page-info').textContent = `${page} / ${totalPages}`;
    $('btn-prev').disabled = page <= 1;
    $('btn-next').disabled = page >= totalPages;
  } else {
    pag.style.display = 'none';
  }
}

async function openDetail(code) {
  currentDetailCode = code;
  $('btn-back').classList.add('show');
  $('header-title').textContent = 'Detail Link';
  $('header-sub').textContent   = code;
  showView('view-detail');

  $('detail-card').innerHTML = `
    <div class="skel" style="height:16px;width:55%;margin-bottom:8px;"></div>
    <div class="skel" style="height:11px;width:35%;margin-bottom:14px;"></div>
    <div class="skel" style="height:32px;width:25%;"></div>`;
  $('detail-tbody').innerHTML = `<tr><td colspan="2" class="td-state">Memuat...</td></tr>`;

  await loadDetailTable();
}

async function loadDetailTable() {
  const from = $('d-from').value, to = $('d-to').value;
  const code = currentDetailCode;
  try {
    const data = await apiFetch(
      `/dashboard/link-chart?user_id=${userId}&code=${code}&date_from=${from}&date_to=${to}`
    );
    const title = data.title || code;
    $('detail-card').innerHTML = `
      <div class="detail-title">${title}</div>
      <div class="detail-code">${code} · ${data.type}</div>
      <div class="detail-stat">
        <div class="detail-val">${fmt(data.totalViews)}</div>
        <div class="detail-lbl">total views</div>
      </div>`;
    renderTable('detail-tbody', from, to, data.data);
  } catch {
    $('detail-tbody').innerHTML = `<tr><td colspan="2" class="td-state">Gagal memuat data</td></tr>`;
  }
}

// Search
$('link-search').addEventListener('input', e => {
  searchQuery = e.target.value.trim();
  $('search-clear').classList.toggle('show', searchQuery.length > 0);
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => loadLinks(1, searchQuery), 400);
});
$('search-clear').addEventListener('click', () => {
  $('link-search').value = '';
  searchQuery = '';
  $('search-clear').classList.remove('show');
  loadLinks(1, '');
});

// Back
$('btn-back').addEventListener('click', () => {
  $('btn-back').classList.remove('show');
  $('header-title').textContent = 'Analytics';
  $('header-sub').textContent   = 'File Share Bot';
  currentDetailCode = null;
  showView('view-main');
});

// Apply
$('btn-g-apply').addEventListener('click', loadGlobalTable);
$('btn-d-apply').addEventListener('click', loadDetailTable);

// Pagination
$('btn-prev').addEventListener('click', () => loadLinks(currentPage - 1, searchQuery));
$('btn-next').addEventListener('click', () => loadLinks(currentPage + 1, searchQuery));

async function init() {
  if (tg) { tg.ready(); tg.expand(); }
  if (!userId)     { showError('User ID tidak ditemukan. Buka dashboard dari dalam bot Telegram.'); return; }
  if (!backendUrl) { showError('Konfigurasi backend tidak lengkap. Hubungi admin bot.'); return; }

  setDefaultDates();
  setupQuickRange('qr-global', 'g-from', 'g-to', loadGlobalTable);
  setupQuickRange('qr-detail', 'd-from', 'd-to', loadDetailTable);

  try {
    await loadSummary();
    await Promise.all([loadGlobalTable(), loadLinks(1)]);
    $('view-loading').style.display = 'none';
    showView('view-main');
  } catch (err) {
    showError(err.message || 'Gagal memuat dashboard.');
  }
}

init();
</script>
</body>
</html>

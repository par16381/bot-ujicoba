<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Membuka Telegram...</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Sora:wght@400;700;800&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Sora', sans-serif;
      background: #0a0f1e;
      color: #f1f5f9;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(59,130,246,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(59,130,246,0.04) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }

    .card {
      position: relative;
      text-align: center;
      max-width: 360px;
      width: 100%;
    }

    .icon {
      font-size: 64px;
      display: block;
      margin-bottom: 16px;
      animation: float 2s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-8px); }
    }

    h1 {
      font-size: 22px;
      font-weight: 800;
      margin-bottom: 8px;
    }

    p {
      font-size: 13px;
      color: #64748b;
      line-height: 1.6;
      margin-bottom: 28px;
    }

    /* Spinner dots */
    .dots {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-bottom: 28px;
    }
    .dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: #3b82f6;
      animation: bounce 1.2s ease-in-out infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; background: #60a5fa; }
    .dot:nth-child(3) { animation-delay: 0.4s; background: #93c5fd; }

    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
      40%            { transform: scale(1);   opacity: 1; }
    }

    /* Tombol fallback — tersembunyi dulu, muncul setelah 3 detik */
    .btn {
      display: none;
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 14px;
      background: linear-gradient(135deg, #229ED9, #1a7ab5);
      box-shadow: 0 4px 16px rgba(34,158,217,0.3);
      color: #fff;
      font-family: 'Sora', sans-serif;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: opacity 0.2s, transform 0.15s;
    }
    .btn:active { transform: scale(0.985); }
    .btn.show { display: flex; animation: fadeUp 0.4s ease forwards; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .note {
      font-size: 11px;
      color: #334155;
      margin-top: 14px;
      display: none;
    }
    .note.show { display: block; }

    /* Error state */
    .err {
      display: none;
      background: #1a0505;
      border: 1px solid #7f1d1d;
      color: #fca5a5;
      border-radius: 11px;
      padding: 12px 14px;
      font-size: 13px;
      margin-top: 16px;
      line-height: 1.5;
    }
    .err.show { display: block; }
  </style>
</head>
<body>
<div class="card">
  <span class="icon">✈️</span>
  <h1>Membuka Telegram...</h1>
  <p>Kamu akan diarahkan ke bot Telegram secara otomatis.</p>

  <div class="dots">
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
  </div>

  <!-- Tombol fallback jika tidak auto-redirect -->
  <a class="btn" id="btn-tg" href="#" target="_blank">
    ✈️ Buka Telegram Manual
  </a>
  <p class="note" id="note">Jika tidak otomatis terbuka, tap tombol di atas</p>
  <div class="err" id="err-box"></div>
</div>

<script>
  // ── Konfigurasi ──────────────────────────────────────────
  const BOT_USERNAME = "ujicoba1111_bot"; // ganti sesuai bot kamu
  // ─────────────────────────────────────────────────────────

  const params = new URLSearchParams(location.search);
  const code   = params.get('code') || '';

  function showError(msg) {
    const dots = document.querySelector('.dots');
    dots.style.display = 'none';
    const err = document.getElementById('err-box');
    err.textContent = msg;
    err.classList.add('show');
  }

  function showFallback(url) {
    const btn  = document.getElementById('btn-tg');
    const note = document.getElementById('note');
    btn.href = url;
    btn.classList.add('show');
    note.classList.add('show');
  }

  function redirect() {
    if (!code) {
      showError('❌ Parameter code tidak ditemukan. Pastikan link yang kamu buka sudah benar.');
      return;
    }

    // Deep link Telegram
    const tgLink = `https://t.me/${BOT_USERNAME}?start=${encodeURIComponent(code)}`;

    // Coba redirect otomatis
    window.location.href = tgLink;

    // Tampilkan tombol fallback setelah 3 detik
    // (kalau redirect berhasil, user sudah pindah — tombol tidak terlihat)
    setTimeout(() => showFallback(tgLink), 3000);
  }

  redirect();
</script>
</body>
</html>
